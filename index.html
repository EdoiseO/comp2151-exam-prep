<script>
const categories=[
  {key:'all',   label:'All 65', cls:'c0'},
  {key:'sdlc',  label:'SDLC',   cls:'c1'},
  {key:'wfall', label:'Waterfall', cls:'c2'},
  {key:'agile', label:'Agile Values', cls:'c3'},
  {key:'why',   label:'Why Agile', cls:'c4'},
  {key:'manif', label:'Manifesto', cls:'c5'},
  {key:'scrum', label:'Scrum', cls:'c6'},
];

const allQ=[
  // ── SDLC (10) ──────────────────────────────────────────────────────────────
  {cat:'sdlc',diff:'easy',q:'What does SDLC stand for?',opts:['Software Delivery and Launch Cycle','Software Development Life Cycle','System Design and Logic Cycle','Software Deployment and Launch Cycle'],ans:1,explain:'SDLC = Software Development Life Cycle — the structured process of planning, creating, testing, and delivering software.',deep:'Without the SDLC, development would be chaotic. It provides clear phases, handoffs, and quality checkpoints that keep projects on track.'},
  {cat:'sdlc',diff:'easy',q:'Which phase of the SDLC comes immediately after Requirements?',opts:['Development','Testing','Design','Maintenance'],ans:2,explain:'Requirements → Design → Development → Testing → Maintenance. Design always follows Requirements.',deep:'Design translates requirements into a blueprint — architecture, database schemas, UI wireframes — that developers follow in the next phase.'},
  {cat:'sdlc',diff:'easy',q:'What is the LAST phase of the traditional SDLC?',opts:['Testing','Deployment','Design','Maintenance'],ans:3,explain:'Maintenance is the final phase — fixing bugs, updating features, and keeping software running after it goes live.',deep:'Maintenance is often the longest phase in total duration. Software may be actively maintained for 5–20 years after initial release.'},
  {cat:'sdlc',diff:'easy',q:'What is the purpose of the Requirements phase?',opts:['Write all the code for the system','Gather and document what the software must do','Design the database schema','Test the completed application'],ans:1,explain:'The Requirements phase is about gathering and documenting exactly what the software needs to do — before any design or coding begins.',deep:'Poor requirements are the #1 cause of project failure. Getting this phase right prevents expensive rework later.'},
  {cat:'sdlc',diff:'easy',q:'What happens in the Testing phase of the SDLC?',opts:['Requirements are gathered from stakeholders','The system architecture is designed','QA teams verify the software works and find bugs','The software is deployed to production'],ans:2,explain:'Testing is where QA teams verify that the software works correctly, find bugs, and validate it meets the original requirements.',deep:'In traditional SDLC, testing is a separate phase after development. In Agile, testing happens throughout every sprint — catching issues much earlier.'},
  {cat:'sdlc',diff:'med',q:'Why is the SDLC divided into distinct phases?',opts:['To give developers more breaks','To improve design, product management, and project management','To satisfy government regulations','To make the project take longer'],ans:1,explain:'The SDLC divides projects into phases to improve design, product management, and project management — creating structure and clear accountability.',deep:'Each phase has defined inputs, outputs, and quality gates. This prevents skipping ahead and ensures each stage is properly completed.'},
  {cat:'sdlc',diff:'med',q:'Which SDLC phase is typically the longest in a traditional project?',opts:['Requirements','Design','Development','Maintenance'],ans:2,explain:'Development is typically the longest — writing all the code takes the most time and resources in a traditional project.',deep:'Interestingly, when you add up the entire product lifetime, Maintenance often exceeds Development in total cost — software is maintained for years after release.'},
  {cat:'sdlc',diff:'med',q:'Which SDLC phase produces "blueprints" like architecture diagrams and database schemas?',opts:['Requirements','Design','Development','Testing'],ans:1,explain:'The Design phase produces blueprints — system architecture diagrams, database schemas, UI wireframes — that developers use in the next phase.',deep:'Good design prevents costly refactoring. Changing architecture mid-development is like changing a building\'s foundation mid-construction.'},
  {cat:'sdlc',diff:'hard',q:'A developer starts coding before the Design phase is complete. Which SDLC principle is being violated?',opts:['Testing must come before development','Each phase must be completed before the next begins','Maintenance must be planned upfront','Requirements must come from the client only'],ans:1,explain:'The SDLC requires each phase to be completed before the next begins. Coding without a complete design leads to inconsistent implementation.',deep:'This is called "cowboy coding." Without a design, developers make conflicting architectural decisions that are expensive to fix later.'},
  {cat:'sdlc',diff:'hard',q:'In what way does Agile fundamentally change the traditional SDLC?',opts:['It removes the Testing phase entirely','It runs all SDLC phases simultaneously in short cycles (sprints) rather than once sequentially','It replaces Requirements with user stories only','It eliminates the need for Design'],ans:1,explain:'Agile runs all SDLC phases — requirements, design, development, testing — within each short sprint, rather than sequentially across months.',deep:'This means every 2-week sprint produces a mini version of the entire SDLC. Bugs surface in days, not months. Requirements are refined continuously, not frozen upfront.'},

  // ── WATERFALL (10) ─────────────────────────────────────────────────────────
  {cat:'wfall',diff:'easy',q:'The Waterfall model is described as which type of approach?',opts:['Adaptive','Iterative','Predictive','Incremental'],ans:2,explain:'Waterfall is a predictive approach — it assumes everything can be planned upfront and executed in strict sequence.',deep:'"Predictive" means the team predicts all requirements, effort, and risks before writing a single line of code — which is rarely realistic for software.'},
  {cat:'wfall',diff:'easy',q:'In Waterfall, what happens after one phase is complete?',opts:['The team loops back to requirements','The next phase begins and the previous cannot be revisited','A sprint review is held','The team ships the software'],ans:1,explain:'Waterfall is strictly sequential — each phase must be 100% complete before the next begins, with no going back.',deep:'This "no going back" rule is the root of most Waterfall problems. Software development is inherently unpredictable, and this model cannot accommodate that reality.'},
  {cat:'wfall',diff:'easy',q:'What industry originally inspired the Waterfall model?',opts:['Healthcare','Finance','Manufacturing and construction','Aerospace'],ans:2,explain:'Waterfall was inherited from manufacturing and construction — industries where sequential phases make physical sense.',deep:'In construction, you genuinely cannot pour the foundation after building the walls. But software has no such physical constraint — yet Waterfall pretended it did.'},
  {cat:'wfall',diff:'easy',q:'In a Waterfall project, when does testing occur?',opts:['Throughout every phase','Before development begins','After all development is complete','During the design phase'],ans:2,explain:'Testing occurs after all development is complete — near the very end of the project lifecycle.',deep:'This "test late" approach is costly. A bug introduced in Requirements and found in Testing has already been baked into months of Design and Development work.'},
  {cat:'wfall',diff:'med',q:'What is the biggest risk of locking in requirements at the start of a Waterfall project?',opts:['It makes the project cheaper','Clients may change their minds or discover new needs, and changes become extremely expensive','Developers have too much freedom','Testing becomes more difficult'],ans:1,explain:'Locking requirements upfront is risky because clients often don\'t know exactly what they want until they see working software — and changes are then extremely costly.',deep:'This is called the "frozen requirements" problem. Waterfall assumes requirements are perfectly known before coding begins — a false assumption in most real-world projects.'},
  {cat:'wfall',diff:'med',q:'A Waterfall project has phases: Requirements, Design, Development, Testing. A bug is found in Testing that originated from a misunderstood requirement. How many phases must be revisited?',opts:['Just Testing','Testing and Development only','All four — Requirements, Design, Development, Testing','None — bugs are fixed directly in code'],ans:2,explain:'A Requirements-level bug that reaches Testing means you must fix the requirement, redo the affected design, recode, and retest — all four phases.',deep:'This cascading rework is called the "cost of late discovery." Studies show fixing a bug in Testing costs 10x more than fixing it in Requirements.'},
  {cat:'wfall',diff:'med',q:'Which of these best describes why Waterfall struggles with modern software projects?',opts:['It requires too many developers','Markets and user needs change faster than Waterfall can respond','It has no testing phase','It requires expensive tools'],ans:1,explain:'Modern software operates in fast-moving markets. Waterfall\'s rigid, upfront planning cannot respond to change — by the time software ships, requirements may be outdated.',deep:'A famous example: Kodak built software systems using Waterfall while digital photography was emerging. By the time systems shipped, the market had moved on entirely.'},
  {cat:'wfall',diff:'hard',q:'Waterfall tries to "maintain scope at the expense of time and cost." What does this mean in practice?',opts:['Scope is reduced to keep the project on time','The team adds more time and money to deliver all originally planned features, often causing overruns','Features are prioritised by business value','The team delivers incrementally to maintain scope'],ans:1,explain:'Waterfall commits to delivering all planned scope, even if that means exceeding time and budget — leading to the overruns that caused the high failure rates.',deep:'This is the opposite of Agile\'s time-boxing approach. Agile fixes time and budget, and adjusts scope — delivering the highest-value features first.'},
  {cat:'wfall',diff:'hard',q:'A 2-year Waterfall project is 20 months in. A competitor releases a similar product. The client wants major new features added. What is the most realistic Waterfall outcome?',opts:['Features are added in the next 2-week sprint','The team must restart the project with new requirements — the entire 20-month investment may be wasted','The Scrum Master prioritises the new features','A quick patch is deployed to production'],ans:1,explain:'In Waterfall, adding major features 20 months into a 24-month project means revisiting Requirements, redesigning, recoding, and retesting — potentially invalidating most of the work done.',deep:'This scenario played out at many large enterprises in the 2000s. By the time multi-year IT projects shipped, the business context had changed completely.'},
  {cat:'wfall',diff:'hard',q:'Waterfall is sometimes called "Top-Down" planning. What does this mean?',opts:['Management sits at the top of the building','Planning starts with the highest-paid person\'s opinion','The entire project is decomposed from the top-level goal into sequential components before work begins','Requirements flow down from the client to developers'],ans:2,explain:'Top-Down planning means the entire project is broken down from the whole into sequential components upfront — all planning happens before execution begins.',deep:'This contrasts with Agile\'s rolling-wave planning, where only the near-term work is planned in detail and long-term plans are kept loose and updated continuously.'},

  // ── AGILE VALUES (10) ──────────────────────────────────────────────────────
  {cat:'agile',diff:'easy',q:'How many core values are in the Agile Manifesto?',opts:['2','3','4','6'],ans:2,explain:'There are 4 Agile values: Individuals & interactions, Working software, Customer collaboration, and Responding to change.',deep:'These 4 values are deliberately simple. They are not rules or processes — they are principles that guide decision-making when trade-offs must be made.'},
  {cat:'agile',diff:'easy',q:'The Agile Manifesto values "working software" over what?',opts:['Customer collaboration','Comprehensive documentation','Responding to change','Individuals and interactions'],ans:1,explain:'The Manifesto values working software over comprehensive documentation — deliver something that works, not just paperwork about it.',deep:'This doesn\'t eliminate documentation — it means documentation should serve the software, not the other way around. Lean, just-enough docs are encouraged.'},
  {cat:'agile',diff:'easy',q:'Which value addresses how teams should interact with clients?',opts:['Individuals and interactions over processes','Working software over documentation','Customer collaboration over contract negotiation','Responding to change over following a plan'],ans:2,explain:'"Customer collaboration over contract negotiation" — work closely with clients throughout, rather than hiding behind legal contracts.',deep:'Traditional projects often used contracts to protect both sides from each other. Agile assumes a collaborative relationship where both parties want the same outcome: great software.'},
  {cat:'agile',diff:'easy',q:'The Agile value "responding to change" is reflected in which Scrum event?',opts:['Daily Standup','Sprint Planning','Sprint Retrospective','Sprint Review and backlog re-prioritisation'],ans:3,explain:'The Sprint Review and subsequent backlog re-prioritisation is where the team responds to change — adjusting plans based on stakeholder feedback.',deep:'Every sprint ends with a Review where stakeholders can redirect the project. This is "responding to change" made concrete — not just a philosophy, but a scheduled event.'},
  {cat:'agile',diff:'med',q:'The Agile Manifesto says the items on the right side (processes, documentation, contracts, plans) have NO value. True or False?',opts:['True — they are completely worthless in Agile','False — the Manifesto says "while there is value in the items on the right"','True — Agile eliminates all documentation','False — but only contracts have value on the right'],ans:1,explain:'False. The Manifesto explicitly states "while there is value in the items on the right, we value the items on the left more." Both sides have value.',deep:'This is a common misconception. Agile does NOT mean "no documentation" or "no planning." It means these things should serve the goal of working software, not become ends in themselves.'},
  {cat:'agile',diff:'med',q:'Which Agile value most directly supports Scrum\'s self-organizing teams?',opts:['Working software over documentation','Responding to change over following a plan','Individuals and interactions over processes and tools','Customer collaboration over contract negotiation'],ans:2,explain:'"Individuals and interactions over processes and tools" — trusting people (not processes) to make decisions is what makes self-organization possible.',deep:'Self-organizing teams work because they trust people closest to the work to make the best decisions. Rigid processes remove that agency and slow teams down.'},
  {cat:'agile',diff:'med',q:'A project manager insists on 200-page requirement specifications before any coding begins. Which Agile value does this violate most directly?',opts:['Customer collaboration over contract negotiation','Working software over documentation','Individuals and interactions over processes','Responding to change over following a plan'],ans:1,explain:'"Working software over documentation" — spending months writing specs before any code is written prioritises documentation over delivering working software.',deep:'In Agile, requirements are captured as lightweight user stories, just detailed enough to be built in a sprint. Heavy upfront documentation delays value delivery.'},
  {cat:'agile',diff:'med',q:'Agile advocates "adaptive planning." What does this mean?',opts:['Plans are made once and never changed','Plans are continuously revised based on what the team learns','Planning is done only by the Scrum Master','Planning happens only at the start of the project'],ans:1,explain:'Adaptive planning means plans are continuously revised — updated each sprint based on new information, feedback, and changing priorities.',deep:'This is the opposite of Waterfall\'s upfront plan. In Agile, the plan is a living document. The Product Backlog represents the current best understanding of what to build next.'},
  {cat:'agile',diff:'hard',q:'A legal team insists all software requirements must be finalised in a signed contract before development begins. How does this conflict with Agile values?',opts:['It conflicts with "working software over documentation"','It conflicts with "customer collaboration over contract negotiation" — contracts over collaboration','It doesn\'t conflict — Agile welcomes contracts','It conflicts with "individuals and interactions over processes"'],ans:1,explain:'"Customer collaboration over contract negotiation" — requiring a locked contract before any work begins prioritises legal protection over the collaborative relationship Agile relies on.',deep:'This is a real tension in enterprise Agile. The solution is often "contracts for collaboration" — lightweight agreements that define the process (Agile) rather than the exact deliverables.'},
  {cat:'agile',diff:'hard',q:'Which of the 4 Agile values is most visible in a Sprint Retrospective?',opts:['Working software over documentation','Customer collaboration over contract negotiation','Individuals and interactions over processes and tools','Responding to change over following a plan'],ans:2,explain:'"Individuals and interactions" — the Retrospective is a dedicated human-centred conversation where the team reflects and improves together, with no tools or processes required.',deep:'The Retrospective is Agile\'s most powerful event because it treats the team as the primary driver of improvement, not a process framework or a management directive.'},

  // ── WHY AGILE (10) ─────────────────────────────────────────────────────────
  {cat:'why',diff:'easy',q:'What was the IT project failure rate according to the 1996 Standish Group study?',opts:['16%','27%','37%','42%'],ans:3,explain:'The 1996 Standish Group study found a 42% failure rate — nearly half of all IT projects were failing.',deep:'This statistic shocked the industry and became a major catalyst for the Agile movement. Something fundamentally different was needed.'},
  {cat:'why',diff:'easy',q:'What are the three dimensions of the Triple Constraint?',opts:['Speed, Quality, Risk','Time, Cost, Scope','People, Process, Technology','Plan, Build, Ship'],ans:1,explain:'The Triple Constraint = Time (schedule), Cost (budget), Scope (features delivered). Failing any one dimension is considered a project failure.',deep:'These three are interconnected — if you add more scope, you need more time or money. If you cut time, you must reduce scope or increase cost. Agile manages this by fixing time and money, and prioritising scope.'},
  {cat:'why',diff:'easy',q:'By 2016, what did the PMI study report the IT project failure rate had dropped to?',opts:['8%','16%','24%','30%'],ans:1,explain:'PMI\'s 2016 study found the failure rate had dropped to 16% — the dramatic improvement is largely credited to Agile adoption.',deep:'Going from 42% (1996) to 16% (2016) represents an enormous improvement. Millions of projects worldwide succeeded instead of failing, saving billions of dollars.'},
  {cat:'why',diff:'easy',q:'What does it mean for a project to "fail" the Time constraint?',opts:['The project is cancelled before completion','The project is delivered later than the planned deadline','The project costs more than budgeted','The project delivers fewer features than planned'],ans:1,explain:'Failing the Time constraint means the project was delivered late — past its planned deadline.',deep:'Late delivery is common in Waterfall because problems discovered late (in Testing) still require full rework, causing delays. Agile\'s sprints surface issues early when they are cheap to fix.'},
  {cat:'why',diff:'med',q:'What percentage of organisations report using Agile approaches sometimes or more frequently?',opts:['41%','55%','71%','89%'],ans:2,explain:'71% of organisations use Agile approaches sometimes or more frequently, according to PMI research.',deep:'This near-universal adoption reflects that Agile is now the industry standard — not just for software, but increasingly for marketing, HR, operations, and other business functions.'},
  {cat:'why',diff:'med',q:'The 2011 PM Solutions study found the IT failure rate was 37%. What trend does this show when compared to 1996 (42%) and 2016 (16%)?',opts:['Failure rates are random and unpredictable','Failure rates have been steadily declining, accelerating after widespread Agile adoption','Failure rates only improve when budgets increase','The 2011 figure is an anomaly'],ans:1,explain:'The trend shows a steady decline: 42% (1996) → 37% (2011) → 16% (2016) — improvements accelerating as Agile adoption grew.',deep:'The steepest drop (37% to 16%) coincides with Agile becoming mainstream after 2010. This correlation is one of the strongest arguments for Agile\'s practical effectiveness.'},
  {cat:'why',diff:'med',q:'Which of these represents a failure of the COST constraint?',opts:['The project delivered 3 months late','The project required $2M extra funding beyond its original budget','The project shipped without 4 planned features','The testing team found 50 bugs'],ans:1,explain:'Exceeding the budget — requiring more money than originally planned — is a failure of the Cost constraint.',deep:'Cost overruns are often caused by scope creep (adding features without adjusting the budget) or late bug discovery (expensive rework in Testing).'},
  {cat:'why',diff:'med',q:'What does "evolutionary development" mean in Agile?',opts:['The software evolves over years without a plan','Software grows incrementally through repeated sprints, with each cycle building on the last','The team evolves its skills over time','Requirements evolve but code does not change'],ans:1,explain:'Evolutionary development means software grows incrementally — each sprint adds to and improves the previous version, evolving toward the full product.',deep:'This contrasts with Waterfall\'s "big bang" delivery — one large release at the end. Evolutionary development means something is always working and always improving.'},
  {cat:'why',diff:'hard',q:'A project delivers on time, on budget, but with only 60% of planned features. Which constraint failed?',opts:['Time — it was late','Cost — it was over budget','Scope — fewer features than planned','None — 2 out of 3 is a pass'],ans:2,explain:'Scope failed — delivering fewer features than planned violates the Scope constraint, even if Time and Cost were met. All three must be satisfied.',deep:'Crucially, in Agile the 60% that does ship should be the MOST VALUABLE 60% — selected by MoSCoW prioritisation. Traditional projects often ship the easiest 60%, not the most important.'},
  {cat:'why',diff:'hard',q:'Why does Agile improve IT project success rates compared to Waterfall?',opts:['Agile uses more expensive developers','Agile removes all documentation requirements','Agile\'s short sprints surface problems early when they are cheap to fix, and continuous delivery maintains business value','Agile projects always have larger budgets'],ans:2,explain:'Agile\'s sprints mean problems are discovered within 2 weeks, not 18 months. Early discovery means cheap fixes. Continuous delivery keeps value flowing to the business throughout.',deep:'The combination of early feedback, continuous improvement, and incremental delivery fundamentally changes the economics of software development — making success far more likely.'},

  // ── MANIFESTO (10) ─────────────────────────────────────────────────────────
  {cat:'manif',diff:'easy',q:'In what year was the Agile Manifesto signed?',opts:['1995','1999','2001','2005'],ans:2,explain:'The Agile Manifesto was signed in February 2001 at a ski resort in Snowbird, Utah.',deep:'The choice of a ski resort was deliberate — an informal, relaxed environment to encourage open thinking. The 17 attendees came from competing methodology camps.'},
  {cat:'manif',diff:'easy',q:'How many developers signed the Agile Manifesto?',opts:['7','12','17','21'],ans:2,explain:'17 developers signed the Agile Manifesto in February 2001.',deep:'The 17 signatories represented Scrum, XP, DSDM, ASD, Crystal, FDD, and Pragmatic Programming — different approaches united by shared values.'},
  {cat:'manif',diff:'easy',q:'What did the 17 developers who wrote the Manifesto name their group?',opts:['The Scrum Alliance','The Software Guild','The Agile Alliance','The DevOps Collective'],ans:2,explain:'They named themselves The Agile Alliance — which still promotes Agile practices worldwide today.',deep:'The Agile Alliance hosts the annual Agile conference, funds research, and maintains agilemanifesto.org. It has grown from 17 founders to hundreds of thousands of members globally.'},
  {cat:'manif',diff:'easy',q:'Who jointly presented the Scrum framework at OOPSLA \'95 in Austin, Texas?',opts:['Jeff Bezos and Elon Musk','Hirotaka Takeuchi and Ikujiro Nonaka','Ken Schwaber and Jeff Sutherland','Martin Fowler and Kent Beck'],ans:2,explain:'Ken Schwaber and Jeff Sutherland jointly presented the Scrum paper at the OOPSLA \'95 conference.',deep:'Both had independently developed similar iterative frameworks. OOPSLA \'95 was where they formalised Scrum together. They later both signed the Agile Manifesto in 2001.'},
  {cat:'manif',diff:'med',q:'What was the original motivation for the 2001 Utah meeting?',opts:['To create a new programming language','To discuss alternatives to documentation-driven, heavyweight methodologies','To standardise software testing practices','To compete with the ISO standards body'],ans:1,explain:'The 17 developers met to discuss alternatives to documentation-driven, heavyweight methodologies — the bureaucratic Waterfall-style approaches that were failing so frequently.',deep:'They were frustrated by methodologies that produced more paperwork than software. They wanted to codify the lightweight, people-centred approaches that were actually working in practice.'},
  {cat:'manif',diff:'med',q:'Takeuchi and Nonaka\'s concept that inspired Scrum compared software development to which sport?',opts:['Basketball','American Football','Rugby','Cricket'],ans:2,explain:'Their mid-1980s paper described a holistic "rugby" approach — the whole team moves together as a unit toward one goal.',deep:'The relay race (each runner completes their leg) = Waterfall. Rugby (whole team moves together, adapts in real-time) = Scrum. The metaphor perfectly captures the self-organising, collaborative nature of Agile teams.'},
  {cat:'manif',diff:'med',q:'Takeuchi and Nonaka published their influential paper in which decade?',opts:['1960s','1970s','1980s','1990s'],ans:2,explain:'Takeuchi and Nonaka published their "rugby approach" paper in the mid-1980s — about 15 years before the formal Agile Manifesto.',deep:'Their work came from studying highly successful product development at companies like Honda, 3M, and Fuji-Xerox. They noticed these companies used a holistic, overlapping team approach rather than relay-race sequential handoffs.'},
  {cat:'manif',diff:'med',q:'When was the first Scrum Guide released?',opts:['2001','2005','2009','2015'],ans:2,explain:'The first Scrum Guide was released in 2009 by the Scrum Alliance.',deep:'The Scrum Guide has been revised several times. The most recent edition (as of the lecture) was released in November 2020 and made Scrum more lightweight and inclusive.'},
  {cat:'manif',diff:'hard',q:'Ken Schwaber and Jeff Sutherland presented Scrum at OOPSLA \'95. What is OOPSLA?',opts:['A programming language','A government IT standards body','An IT conference — Object-Oriented Programming, Systems, Languages and Applications','A software testing framework'],ans:2,explain:'OOPSLA is a major academic and industry IT conference focused on Object-Oriented Programming, Systems, Languages and Applications.',deep:'Presenting at OOPSLA gave Scrum academic credibility. The conference was influential in shaping software engineering practices throughout the 1990s and 2000s.'},
  {cat:'manif',diff:'hard',q:'The Agile Manifesto has 4 values and how many principles?',opts:['4','8','12','16'],ans:2,explain:'The Agile Manifesto has 4 values AND 12 supporting principles that elaborate on how the values should be applied in practice.',deep:'The 12 principles cover topics like customer satisfaction, welcoming change, working software, sustainable pace, technical excellence, simplicity, self-organising teams, and regular reflection. The lecture focuses on the 4 values.'},

  // ── SCRUM (15) ─────────────────────────────────────────────────────────────
  {cat:'scrum',diff:'easy',q:'Scrum is described as what type of framework?',opts:['A heavyweight, comprehensive methodology','A lightweight process framework','A project management standard','A programming language'],ans:1,explain:'Scrum is a lightweight process framework — "lightweight" means minimal overhead so teams spend maximum time on productive work.',deep:'Compare Scrum\'s 3 roles, 3 artifacts, and 5 events to PRINCE2\'s dozens of roles and hundreds of processes. Scrum\'s power comes entirely from its simplicity.'},
  {cat:'scrum',diff:'easy',q:'How many Scrum Principles are there?',opts:['4','5','6','8'],ans:2,explain:'There are 6 Scrum Principles: Empirical Process Control, Self-organization, Collaboration, Value-based Prioritization, Time-boxing, and Iterative Development.',deep:'Each principle underpins specific Scrum practices. Time-boxing explains why sprints have fixed lengths. Empirical Process Control explains why the Retrospective exists.'},
  {cat:'scrum',diff:'easy',q:'How many Scrum Aspects are there?',opts:['3','4','5','6'],ans:2,explain:'There are 5 Scrum Aspects: Organization, Business Justification, Quality, Change, and Risk.',deep:'Aspects are the key dimensions that must be managed throughout every Scrum project. Unlike Principles (philosophical) and Processes (steps), Aspects are ongoing concerns.'},
  {cat:'scrum',diff:'easy',q:'What are the 3 core Scrum roles?',opts:['Manager, Developer, Tester','Product Owner, Scrum Master, Development Team','CEO, CTO, Developer','Analyst, Designer, Programmer'],ans:1,explain:'The 3 core Scrum roles are: Product Owner (voice of the customer), Scrum Master (servant-leader), and Development Team (builders).',deep:'These 3 roles cover everything needed to deliver a product. No additional roles are defined in Scrum — though organisations can have non-core roles like stakeholders, vendors, etc.'},
  {cat:'scrum',diff:'easy',q:'What are the 3 Scrum artifacts?',opts:['User stories, tasks, bugs','Product Backlog, Sprint Backlog, Increment','Vision, Roadmap, Release plan','Requirements, Design docs, Test cases'],ans:1,explain:'The 3 Scrum artifacts are: Product Backlog (all desired work), Sprint Backlog (this sprint\'s work), and Increment (working software built this sprint).',deep:'Each artifact provides transparency into a different aspect of progress: the Product Backlog shows the product vision, the Sprint Backlog shows current sprint progress, and the Increment shows what\'s been built.'},
  {cat:'scrum',diff:'easy',q:'How long is a typical sprint?',opts:['1 day to 1 week','1 to 6 weeks, usually 2 weeks','1 to 3 months','6 months'],ans:1,explain:'A sprint lasts between 1 and 6 weeks, with 2 weeks being the most common choice in practice.',deep:'Shorter sprints (1-2 weeks) mean faster feedback loops but more ceremony overhead. Longer sprints (3-4 weeks) mean less overhead but slower feedback. Most teams find 2 weeks to be the sweet spot.'},
  {cat:'scrum',diff:'med',q:'What is the difference between the Product Backlog and the Sprint Backlog?',opts:['They are the same thing','Product Backlog = all desired work (owned by PO); Sprint Backlog = current sprint\'s committed work (owned by Dev Team)','Sprint Backlog is owned by the Scrum Master','Product Backlog contains only bugs'],ans:1,explain:'Product Backlog = all desired work, owned by the Product Owner. Sprint Backlog = the subset committed to in the current sprint, owned by the Development Team.',deep:'A healthy Product Backlog is always longer than can be done in one sprint. The Sprint Backlog is a focused, achievable slice of that vision deliverable in 1–4 weeks.'},
  {cat:'scrum',diff:'med',q:'The Scrum Master is best described as which type of leader?',opts:['Authoritarian — assigns tasks and enforces deadlines','Servant-leader — facilitates, removes impediments, protects the team','Technical lead — reviews all code','Project manager — controls scope, time, and budget'],ans:1,explain:'The Scrum Master is a servant-leader — they serve the team by facilitating events, removing obstacles, and creating conditions for self-organization.',deep:'This is a radical departure from traditional management. A Scrum Master never assigns tasks or makes technical decisions — their power comes from enabling others, not directing them.'},
  {cat:'scrum',diff:'med',q:'What is the purpose of the Daily Standup?',opts:['To give a full status report to management','A 15-minute daily sync — what did I do, what will I do, any blockers?','To plan the next sprint','To review completed work with stakeholders'],ans:1,explain:'The Daily Standup is a 15-minute time-boxed sync where each team member shares: what did I do yesterday, what will I do today, any impediments?',deep:'The 15-minute limit forces brevity and prevents the Standup becoming a meeting. Deep discussions happen after — not during — the Standup.'},
  {cat:'scrum',diff:'med',q:'What happens during a Sprint Review?',opts:['The team discusses internal improvements','Working software is demonstrated to stakeholders and feedback is gathered','Tasks are assigned for the next sprint','The team estimates story points'],ans:1,explain:'The Sprint Review is where the team demonstrates completed working software to stakeholders and gathers feedback that shapes the next sprint.',deep:'The Sprint Review is Agile\'s "show, don\'t tell" moment. Rather than status reports, stakeholders see real working software. Their feedback directly influences what gets built next.'},
  {cat:'scrum',diff:'med',q:'What is the purpose of the Sprint Retrospective?',opts:['To plan the next sprint','To demo work to stakeholders','For the team to reflect on the process — what went well, what to improve','To groom the product backlog'],ans:2,explain:'The Sprint Retrospective is where the team reflects on the previous sprint — what went well, what didn\'t, and what concrete changes to make next sprint.',deep:'The Retrospective embodies the Agile principle of continuous improvement. Teams that skip Retrospectives miss their most powerful tool for becoming more effective over time.'},
  {cat:'scrum',diff:'hard',q:'If the Scrum Master assigns tasks during Sprint Planning, which Scrum principle is violated?',opts:['Time-boxing','Iterative Development','Self-organization','Empirical Process Control'],ans:2,explain:'Self-organization is violated — the Development Team chooses its own work. No one, not even the Scrum Master, assigns tasks.',deep:'Self-organizing teams consistently outperform directed teams because those closest to the work make the best decisions. Top-down assignment creates dependency and destroys initiative.'},
  {cat:'scrum',diff:'hard',q:'The Increment must be "potentially releasable." What does this mean in practice?',opts:['It will definitely be shipped to users','It must be documented but not necessarily working','It must be complete, tested, and of sufficient quality to ship if the PO decides to','It only needs to pass unit tests'],ans:2,explain:'"Potentially releasable" means the Increment is complete, meets the Definition of Done, and could be deployed to production right now if the Product Owner chose to.',deep:'This is a high bar. It forces quality into every sprint rather than saving it for a "hardening sprint" at the end — a common anti-pattern that delays quality work.'},
  {cat:'scrum',diff:'hard',q:'Value-based Prioritization means the team builds the most technically complex stories first. True or False?',opts:['True — technical complexity drives the sprint plan','False — stories with the highest BUSINESS value are built first, regardless of technical complexity','True — complexity reduces risk early','False — stories are built in the order the client requests'],ans:1,explain:'False. Value-based Prioritization means the highest BUSINESS VALUE stories are built first — not the most technically complex ones. The Product Owner determines business value.',deep:'Building high-value stories first means even if the project is cancelled after Sprint 1, the most important features have been delivered. Low-value, high-complexity stories are deferred or dropped.'},
  {cat:'scrum',diff:'hard',q:'Empirical Process Control is based on three pillars. Which set correctly identifies them?',opts:['Plan, Do, Check','Transparency, Inspection, Adaptation','Observe, Measure, Improve','Sprint, Review, Retrospect'],ans:1,explain:'Empirical Process Control rests on three pillars: Transparency (everyone can see what\'s happening), Inspection (regularly examine progress), and Adaptation (adjust based on what you find).',deep:'These three pillars underpin ALL Scrum events. The Daily Standup (inspect daily), Sprint Review (inspect increment), and Retrospective (adapt process) are all expressions of Empirical Process Control.'},
];

let currentCat='all',questions=[...allQ],qi=0,score=0,correct=0,wrong=0,answered=false;
let catScores={};
function resetCatScores(){
  catScores={};
  categories.slice(1).forEach(c=>{catScores[c.key]={correct:0,total:0};});
}
resetCatScores();

function getQ(){return currentCat==='all'?allQ:allQ.filter(q=>q.cat===currentCat);}

function renderNav(){
  const counts={};
  categories.slice(1).forEach(c=>{counts[c.key]=allQ.filter(q=>q.cat===c.key).length;});
  document.getElementById('cat-nav').innerHTML=categories.map(c=>`
    <button class="cat-btn ${c.cls}${currentCat===c.key?' active':''}" onclick="setCat('${c.key}')">
      ${c.label}${c.key!=='all'?` <span style="font-size:10px;opacity:0.7">(${counts[c.key]||0})</span>`:''}
    </button>`).join('');
}

function setCat(k){
  currentCat=k;questions=getQ();
  qi=0;score=0;correct=0;wrong=0;answered=false;
  resetCatScores();
  updateSc();renderNav();renderQ();
}

function updateSc(){
  const total=questions.length;
  document.getElementById('sc-score').textContent=score;
  document.getElementById('sc-correct').textContent=correct;
  document.getElementById('sc-wrong').textContent=wrong;
  document.getElementById('sc-left').textContent=Math.max(0,total-qi);
  const pct=qi>0?Math.round(correct/qi*100):0;
  document.getElementById('sc-pct').textContent=pct+'%';
  document.getElementById('pbar').style.width=(total>0?Math.round(qi/total*100):0)+'%';
}

function renderQ(){
  updateSc();
  if(qi>=questions.length){renderResults();return;}
  const q=questions[qi];
  const catLabel=categories.find(c=>c.key===q.cat)?.label||q.cat;
  const diffCls=q.diff==='easy'?'diff-easy':q.diff==='med'?'diff-med':'diff-hard';
  document.getElementById('q-area').innerHTML=`
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${qi+1} of ${questions.length}</span>
        <span class="q-cat">${catLabel}</span>
        <span class="q-diff ${diffCls}">${q.diff==='easy'?'Easy':q.diff==='med'?'Medium':'Hard'}</span>
        ${q.retry?`<span class="retry-badge">Retry ${q.retry}</span>`:''}
      </div>
      <div class="q-text">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="ans(${i})"><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="deep-dive" id="dd"><div class="deep-label">Why this matters:</div>${q.deep}</div>
    </div>
    <div class="q-footer">
      <span style="font-size:12px;color:var(--color-text-secondary)">Answer to reveal explanation</span>
      <button class="nbtn primary" id="nxt" style="display:none" onclick="nextQ()">${qi<questions.length-1?'Next →':'See results →'}</button>
    </div>`;
  answered=false;
}

window.ans=(chosen)=>{
  if(answered)return;answered=true;
  const q=questions[qi];const ok=chosen===q.ans;
  if(ok){correct++;score+=q.diff==='easy'?1:q.diff==='med'?2:3;}else{wrong++;}
  if(!ok){requeueQuestion(q);}
  if(catScores[q.cat]){catScores[q.cat].total++;if(ok)catScores[q.cat].correct++;}
  q.opts.forEach((_,i)=>{
    const b=document.getElementById('opt'+i);b.disabled=true;
    if(i===q.ans)b.classList.add(chosen===q.ans?'correct':'reveal');
    else if(i===chosen&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  fb.innerHTML=`<strong>${ok?'✓ Correct!':'✗ Not quite.'}</strong> ${q.explain}${ok?'':'<br><strong>Study loop:</strong> This question was added back into the remaining questions at a random spot.'}`;
  fb.className='feedback show '+(ok?'ok':'bad');
  document.getElementById('dd').className='deep-dive show';
  document.getElementById('nxt').style.display='inline-block';
  updateSc();
};

function requeueQuestion(q){
  const retryQuestion={...q,...shuffleOptions(q),retry:(q.retry||0)+1};
  const firstPossibleIndex=qi+1;
  const lastPossibleIndex=questions.length;
  const insertAt=Math.floor(Math.random()*(lastPossibleIndex-firstPossibleIndex+1))+firstPossibleIndex;
  questions.splice(insertAt,0,retryQuestion);
}

function shuffleOptions(q){
  const shuffled=q.opts.map((text,index)=>({text,index}));
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  return {
    opts:shuffled.map(o=>o.text),
    ans:shuffled.findIndex(o=>o.index===q.ans)
  };
}

window.nextQ=()=>{qi++;renderQ();};

function renderResults(){
  const total=questions.length;
  const maxPts=questions.reduce((a,q)=>a+(q.diff==='easy'?1:q.diff==='med'?2:3),0);
  const pct=Math.round(correct/total*100);
  const grade=pct===100?'Perfect score! 🎉':pct>=85?'Excellent!':pct>=70?'Great work!':pct>=55?'Good effort!':'Keep going!';
  const cats=categories.slice(1);
  const bd=cats.map(c=>{
    const cs=catScores[c.key]||{correct:0,total:0};
    const p=cs.total>0?Math.round(cs.correct/cs.total*100):0;
    const col=p>=70?'#111':p>=45?'#BA7517':'#E24B4A';
    return `<div class="cat-row">
      <span style="font-size:12px;min-width:100px;color:var(--color-text-secondary)">${c.label}</span>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${p}%;background:${col}"></div></div>
      <span class="cat-score-lbl">${cs.correct}/${cs.total} (${p}%)</span>
    </div>`;
  }).join('');
  document.getElementById('q-area').innerHTML=`
    <div class="results">
      <div class="result-score">${correct}/${total}</div>
      <div class="result-grade">${grade} &nbsp;·&nbsp; ${pct}% &nbsp;·&nbsp; ${score} / ${maxPts} pts</div>
      <div class="cat-breakdown" style="margin-top:1rem">${bd}</div>
      <p style="font-size:13px;margin:1rem 0">${pct>=70?'Strong command of Lecture 1 — ready for Lecture 2!':'Focus on the red categories above and retry those sections.'}</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="nbtn primary" onclick="setCat('all')">Retry all 65</button>
        ${cats.map(c=>`<button class="nbtn" onclick="setCat('${c.key}')">${c.label}</button>`).join('')}
      </div>
    </div>`;
  document.getElementById('pbar').style.width='100%';
}

renderNav();renderQ();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMP2151 Exam Prep</title>
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<main class="app">
  <h1>COMP2151 Exam Prep</h1>
  <p class="sub">Practice by lecture, retry missed questions, and build toward a full exam review set.</p>

  <div class="lecture-nav" id="lecture-nav"></div>

  <section class="lecture-panel">
    <h2 id="lecture-title">Loading...</h2>
    <p class="sub" id="lecture-subtitle">Preparing questions.</p>

    <div class="scoreboard">
      <div class="sc"><div class="sc-num" id="sc-score">0</div><div class="sc-lbl">Points</div></div>
      <div class="sc"><div class="sc-num" id="sc-correct" style="color:#639922">0</div><div class="sc-lbl">Correct</div></div>
      <div class="sc"><div class="sc-num" id="sc-wrong" style="color:#E24B4A">0</div><div class="sc-lbl">Wrong</div></div>
      <div class="sc"><div class="sc-num" id="sc-pct">0%</div><div class="sc-lbl">Accuracy</div></div>
      <div class="sc"><div class="sc-num" id="sc-left">0</div><div class="sc-lbl">Remaining</div></div>
    </div>

    <div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
    <div class="cat-nav" id="cat-nav"></div>
    <div id="q-area"></div>
  </section>
</main>

<script src="data/lecture1.js"></script>
<script src="data/lecture2.js"></script>
<script src="data/lecture3.js"></script>
<script src="data/lecture4.js"></script>
<script src="data/lecture5.js"></script>
<script src="data/lecture6.js"></script>
<script src="data/lecture7.js"></script>
<script src="data/lecture8.js"></script>
<script src="src/app.js"></script>
</body>
</html>
